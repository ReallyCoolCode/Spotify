<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spotify for Android TV</title>
<style>
  body {
    background: #ffffff;
    color: #000000;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
  }
  header {
    background-color: #222222;
    color: #ffffff;
    padding: 20px 0;
    text-align: center;
    font-weight: bold;
  }
  header img {
    height: 40px;
    vertical-align: middle;
  }
  main {
    max-width: 600px;
    margin: 40px auto;
    padding: 0 20px;
    text-align: center;
  }
  main p {
    font-size: 1.2em;
    margin-bottom: 30px;
  }
  .btn {
    display: inline-block;
    background-color: #99bb18;
    color: white;
    padding: 14px 36px;
    font-size: 1.1em;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 600;
    margin: 10px;
    box-shadow: none;
    transition: none;
  }
  footer {
    text-align: center;
    color: #555555;
    font-size: 0.9em;
    padding: 30px 0;
  }
</style>
</head>
<body>

<header>
  <img src="https://www.scdn.co/i/_global/logo.png" />
</header>

<main>
  <p>What device are you on?</p>
  <a href="https://htmlpreview.github.io/?https://github.com/ReallyCoolCode/Spotify/blob/main/home.html" class="btn">Phone</a>
  <a href="https://htmlpreview.github.io/?https://github.com/ReallyCoolCode/Spotify/blob/main/index.html" target="_blank" rel="noopener" class="btn">TV</a>
</main>

<footer>
  &copy; 2013 Spotify AB
</footer>

</body>
</html>
